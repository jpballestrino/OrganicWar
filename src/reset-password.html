<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reset your OrganicWar.io password">
    <title>Reset Password — OrganicWar.io</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a1a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(255,193,7,0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(100,100,255,0.04) 0%, transparent 60%);
        }
        .container {
            background: rgba(15, 15, 25, 0.95);
            border: 1px solid rgba(255,193,7,0.25);
            border-radius: 12px;
            padding: 40px 35px;
            width: 420px;
            max-width: 90vw;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(255,193,7,0.05);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            letter-spacing: 3px;
        }
        .logo .main { color: #ffc107; }
        .logo .io { color: #fff; }
        .logo .tagline {
            color: #888;
            font-size: 12px;
            margin-top: 5px;
            letter-spacing: 1px;
        }
        .subtitle {
            text-align: center;
            color: #ccc;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 16px;
        }
        .input-group label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .input-wrap {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;
            overflow: hidden;
            transition: border-color 0.2s;
        }
        .input-wrap:focus-within {
            border-color: rgba(255,193,7,0.5);
        }
        .input-icon {
            padding: 0 12px;
            font-size: 16px;
            opacity: 0.6;
        }
        .input-wrap input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 14px;
            padding: 12px 12px 12px 0;
            outline: none;
            font-family: 'Inter', sans-serif;
        }
        .input-wrap input::placeholder {
            color: rgba(255,255,255,0.3);
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ffc107, #e6a800);
            color: #000;
            font-weight: 700;
            font-size: 15px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(255,193,7,0.3); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .error-msg {
            color: #ff6b6b;
            background: rgba(220,53,69,0.15);
            border: 1px solid rgba(220,53,69,0.3);
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 15px;
            display: none;
        }
        .success-msg {
            color: #4ade80;
            background: rgba(40,167,69,0.15);
            border: 1px solid rgba(40,167,69,0.3);
            padding: 15px;
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
            display: none;
        }
        .success-msg a {
            color: #ffc107;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            margin-top: 10px;
        }
        .success-msg a:hover { text-decoration: underline; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 13px;
            text-decoration: none;
        }
        .back-link:hover { color: #ffc107; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1><span class="main">ORGANICWAR</span><span class="io">.io</span></h1>
            <div class="tagline">Password Reset</div>
        </div>

        <!-- Reset form -->
        <div id="resetForm">
            <div class="subtitle">Enter your new password below.</div>
            <div class="error-msg" id="errorMsg"></div>

            <div class="input-group">
                <label>NEW PASSWORD</label>
                <div class="input-wrap">
                    <span class="input-icon">🔑</span>
                    <input type="password" id="newPassword" placeholder="••••••••" minlength="6">
                </div>
            </div>

            <div class="input-group">
                <label>CONFIRM PASSWORD</label>
                <div class="input-wrap">
                    <span class="input-icon">🔑</span>
                    <input type="password" id="confirmPassword" placeholder="••••••••" minlength="6">
                </div>
            </div>

            <button class="btn" id="btnReset">Reset Password</button>
        </div>

        <!-- Success state -->
        <div class="success-msg" id="successMsg">
            ✅ Password updated successfully!<br>
            <a href="/">← Return to OrganicWar.io</a>
        </div>

        <!-- No-token state -->
        <div id="noTokenMsg" style="display:none; text-align: center; color: #ff6b6b; padding: 20px;">
            <p style="font-size: 40px; margin-bottom: 15px;">⚠️</p>
            <p>No reset token found. This link may have expired or already been used.</p>
            <a href="/" class="back-link">← Back to OrganicWar.io</a>
        </div>

        <a href="/" class="back-link" id="backLink">← Back to OrganicWar.io</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        const resetForm = document.getElementById('resetForm');
        const noTokenMsg = document.getElementById('noTokenMsg');
        const successMsg = document.getElementById('successMsg');
        const errorMsg = document.getElementById('errorMsg');
        const backLink = document.getElementById('backLink');

        if (!token) {
            resetForm.style.display = 'none';
            backLink.style.display = 'none';
            noTokenMsg.style.display = 'block';
        }

        document.getElementById('btnReset').addEventListener('click', async () => {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            errorMsg.style.display = 'none';

            if (!newPassword || newPassword.length < 6) {
                errorMsg.textContent = 'Password must be at least 6 characters.';
                errorMsg.style.display = 'block';
                return;
            }
            if (newPassword !== confirmPassword) {
                errorMsg.textContent = 'Passwords do not match.';
                errorMsg.style.display = 'block';
                return;
            }

            const btn = document.getElementById('btnReset');
            btn.disabled = true;
            btn.textContent = 'Resetting...';

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });
                const data = await res.json();

                if (!res.ok) {
                    errorMsg.textContent = data.error || 'Something went wrong.';
                    errorMsg.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Reset Password';
                    return;
                }

                resetForm.style.display = 'none';
                backLink.style.display = 'none';
                successMsg.style.display = 'block';
            } catch (err) {
                errorMsg.textContent = 'Network error. Please try again.';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        });

        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') document.getElementById('btnReset').click();
            });
        });
    </script>
</body>
</html>
